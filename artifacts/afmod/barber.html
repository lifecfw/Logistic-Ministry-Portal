<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>محلات الحلاقة | عرب فيرست</title>
    <meta name="description" content="محلات الحلاقة الرسمية في عرب فيرست" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="محلات الحلاقة | عرب فيرست" />
    <meta property="og:description" content="محلات الحلاقة الرسمية في عرب فيرست — AFMOD Ministry of Logistics" />
    <meta property="og:image" content="/afmod-logo.png" />
    <meta property="og:site_name" content="Arab First" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="محلات الحلاقة | عرب فيرست" />
    <meta name="twitter:description" content="محلات الحلاقة في عرب فيرست" />
    <meta name="twitter:image" content="/afmod-logo.png" />
    <link rel="icon" type="image/png" href="afmod-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=Noto+Kufi+Arabic:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="loading-screen" class="loading-screen"><div class="spinner"></div></div>
    <div id="page" class="view hidden">
      <div id="watermark" class="watermark"></div>
      <div class="texture-overlay"></div>
      <header class="site-header" id="site-header"></header>
      <main class="main-content">
        <section class="container dashboard-section">
          <div class="dashboard-header">
            <div>
              <div class="dashboard-title-row">
                <svg class="icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M6 2v20"/><path d="M18 2v20"/>
                  <path d="M6 12h12"/><path d="M2 7h4"/><path d="M18 7h4"/>
                  <path d="M2 17h4"/><path d="M18 17h4"/>
                </svg>
                <h2>محلات الحلاقة الرسمية</h2>
              </div>
              <p class="dashboard-description">محلات الحلاقة المرخّصة في عرب فيرست. امتلك محل حلاقة وأدر مخزونه وأرباحه من خلال البوابة الرسمية.</p>
            </div>
            <div class="dashboard-badge dashboard-badge-green">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/>
              </svg>
              <span>معروض رسمي • <span id="barber-count">0</span> محلات</span>
            </div>
          </div>
          <div id="barber-grid" class="gas-grid-full"></div>
        </section>
      </main>
      <footer class="site-footer"><div class="container footer-content"><img src="afmod-logo.png" alt="AFMOD Seal" class="footer-logo" /><p class="footer-line-en">ARAB FIRST — MINISTRY OF LOGISTICS</p><p class="footer-line-ar">© 2026 Arab First — جميع الحقوق محفوظة</p></div></footer>
    </div>
    <div id="toast-container" class="toast-container"></div>
    <script src="shared.js"></script>
    <script>
    (function () {
      var e = window.escText, ea = window.escAttr, fp = window.formatPrice;

      var BARBER_SHOPS = [
        {
          id: "city-barber",
          nameEn: "Barber Shop",
          nameAr: "محل الحلاقة",
          image: "https://static.wikia.nocookie.net/emergency-response-liberty-county/images/6/6a/BarberShopExterior1.png/revision/latest?cb=20221001070915",
          locationAr: "شارع السوق المركزي — وسط المدينة",
          hoursAr: "٩ صباحاً — ١٠ مساءً",
          servicesAr: ["قص الشعر", "حلاقة الذقن", "تقليم اللحية", "صبغ الشعر", "تصفيف الشعر", "العناية بالأظافر"],
          price: 8_000_000,
          notesAr: "محل الحلاقة الرئيسي في المدينة، مزدحم ومطلوب من جميع المواطنين. دخل ثابت طوال اليوم.",
          profitAr: "15K — 30K يومياً"
        }
      ];

      var SUPPLY_ITEMS = [
        "مقصات احترافية", "ماكينات حلاقة", "شامبو ومستحضرات", "صبغات شعر", "جل وشمع التصفيف",
        "مناشف ومعقمات", "زيت لحية", "بومدة وكريمات", "موسى حلاقة", "ملحقات الكراسي"
      ];

      function renderBarbers(shops) {
        var grid = document.getElementById("barber-grid");
        document.getElementById("barber-count").textContent = shops.length;
        grid.innerHTML = "";
        shops.forEach(function (sh, i) {
          var card = document.createElement("div");
          card.className = "gas-card-full"; card.style.animationDelay = (i*0.1)+"s";
          var svcsHtml = sh.servicesAr.map(function (s) { return '<span class="grocery-item-tag">'+e(s)+'</span>'; }).join("");
          var supplyHtml = SUPPLY_ITEMS.map(function (s) { return '<span class="grocery-item-tag" style="opacity:0.75">'+e(s)+'</span>'; }).join("");
          card.innerHTML =
            '<div class="gas-full-image-wrap">' +
              '<img src="'+ea(sh.image)+'" alt="'+ea(sh.nameAr)+'" loading="lazy" referrerpolicy="no-referrer" onerror="window.__afmodImageFallback(this)" />' +
              '<div class="gas-full-image-overlay"></div>' +
              '<div class="gas-full-image-badge"><span class="grocery-main-badge">💈 حلاقة</span></div>' +
            '</div>' +
            '<div class="gas-full-body">' +
              '<div class="gas-full-header">' +
                '<div>' +
                  '<h3 class="gas-full-name">'+e(sh.nameAr)+'</h3>' +
                  '<p class="gas-full-name-en">'+e(sh.nameEn)+'</p>' +
                '</div>' +
                '<div class="gas-full-price-badge">'+e(fp(sh.price))+'</div>' +
              '</div>' +
              '<div class="gas-full-details">' +
                '<div class="gas-detail-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><div><strong>الموقع</strong><span>'+e(sh.locationAr)+'</span></div></div>' +
                '<div class="gas-detail-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><div><strong>ساعات العمل</strong><span>'+e(sh.hoursAr)+'</span></div></div>' +
                '<div class="gas-detail-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><div><strong>الدخل اليومي المتوقع</strong><span>'+e(sh.profitAr)+'</span></div></div>' +
                '<div class="gas-detail-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><div><strong>نوع المشروع</strong><span>محل حلاقة رجالي — مرخّص رسمياً</span></div></div>' +
              '</div>' +
              '<div class="grocery-items-section"><h4>الخدمات المقدّمة</h4><div class="grocery-items-wrap">'+svcsHtml+'</div></div>' +
              '<div class="grocery-items-section" style="margin-top:0.75rem"><h4>المخزون القابل للشراء (13 صنف)</h4><div class="grocery-items-wrap">'+supplyHtml+'</div></div>' +
              (sh.notesAr ? '<p class="gas-card-notes">'+e(sh.notesAr)+'</p>' : '') +
              '<div class="gas-card-buy-row">' +
                '<button class="btn-gas-grocery btn-buy-barber" type="button" data-id="'+ea(sh.id)+'">' +
                  '<span class="btn-label">شراء محل الحلاقة</span>' +
                  '<span class="btn-gas-grocery-price">'+e(fp(sh.price))+'</span>' +
                '</button>' +
              '</div>' +
            '</div>';
          card.querySelector(".btn-buy-barber").addEventListener("click", function () {
            var btn = this; btn.disabled = true; btn.querySelector(".btn-label").textContent = "جاري الإرسال...";
            window.afApi.buyBarber(sh.id).then(function () {
              window.afToast("تم الشراء", "تم تسجيل "+sh.nameAr+" باسمك بنجاح.", "success");
            }).catch(function (err) {
              var msg = "تعذّر إتمام الشراء.";
              if (err && err.status === 402) msg = "الرصيد غير كافٍ.";
              else if (err && err.status === 409) msg = "هذا المحل مملوك بالفعل.";
              else if (err && err.status === 503) msg = "البوت غير متصل.";
              window.afToast("فشل الشراء", msg, "error");
            }).then(function () { btn.disabled = false; btn.querySelector(".btn-label").textContent = "شراء محل الحلاقة"; });
          });
          grid.appendChild(card);
        });
      }

      window.afCheckAuth(function (user) {
        document.getElementById("loading-screen").classList.add("hidden");
        document.getElementById("page").classList.remove("hidden");
        window.afRenderHeader(user, "barber");
        window.afRenderWatermark(user);
        renderBarbers(BARBER_SHOPS);
      });
    })();
    </script>
  </body>
</html>
