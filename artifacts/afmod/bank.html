<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>البنك | عرب فيرست</title>
    <meta property="og:type" content="website" />
    <meta property="og:title" content="البنك | عرب فيرست" />
    <meta property="og:description" content="بنك ريفر سيتي الرسمي في عرب فيرست — AFMOD" />
    <meta property="og:image" content="/afmod-logo.png" />
    <link rel="icon" type="image/png" href="afmod-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=Noto+Kufi+Arabic:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="loading-screen" class="loading-screen"><div class="spinner"></div></div>
    <div id="page" class="view hidden">
      <div id="watermark" class="watermark"></div>
      <div class="texture-overlay"></div>
      <header class="site-header" id="site-header"></header>
      <main class="main-content">
        <section class="container dashboard-section">
          <div class="dashboard-header">
            <div>
              <div class="dashboard-title-row">
                <svg class="icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="3" y1="22" x2="21" y2="22"/><rect x="5" y="12" width="3" height="10"/>
                  <rect x="11" y="12" width="3" height="10"/><rect x="17" y="12" width="3" height="10"/>
                  <polygon points="12 2 20 7 4 7"/>
                </svg>
                <h2>البنك الرسمي</h2>
              </div>
              <p class="dashboard-description">بنك ريفر سيتي — المؤسسة المالية الرسمية الوحيدة في ليبرتي كاونتي. أعلى دخل يومي بين جميع المشاريع. للمستثمرين الكبار فقط.</p>
            </div>
            <div class="dashboard-badge" style="background:rgba(212,175,55,.12);border-color:rgba(212,175,55,.35);color:#d4af37">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
              <span>مشروع مميز • حصري</span>
            </div>
          </div>
          <div id="bank-grid" class="gas-grid-full"></div>
        </section>
      </main>
      <footer class="site-footer"><div class="container footer-content"><img src="afmod-logo.png" alt="AFMOD Seal" class="footer-logo" /><p class="footer-line-en">ARAB FIRST — MINISTRY OF LOGISTICS</p><p class="footer-line-ar">© 2026 Arab First — جميع الحقوق محفوظة</p></div></footer>
    </div>
    <div id="toast-container" class="toast-container"></div>
    <script src="shared.js"></script>
    <script>
    (function () {
      var e = window.escText, ea = window.escAttr, fp = window.formatPrice;

      var BANKS = [
        {
          id: "city-bank", type: "bank",
          nameAr: "بنك ريفر سيتي", nameEn: "Bank of River City",
          image: "https://static.wikia.nocookie.net/emergency-response-liberty-county/images/2/26/Imagen_Banco_RC.png/revision/latest?cb=20260410010531",
          locationAr: "شارع ساندستون ٢٠٥١ — مركز المدينة", hoursAr: "٨ صباحاً — ٥ مساءً (يومياً)",
          badge: "🏦 بنك",
          servicesAr: ["الحسابات الجارية", "التحويلات المالية", "القروض والائتمان", "صناديق الأمانات", "الصرف الأجنبي", "إدارة الثروات"],
          supplyAr: ["أوراق مالية", "قرطاسية رسمية", "أنظمة أمن", "معدات مكتبية", "أجهزة صرف آلي", "خزائن حديدية"],
          price: 100_000_000, profitAr: "30K — 60K يومياً",
          notesAr: "أعلى مشروع ربحياً في ليبرتي كاونتي. المؤسسة المالية الوحيدة في المدينة. استثمار للنخبة فقط — العائد يتضاعف عند سداد القروض وأوقات الذروة."
        }
      ];

      function renderBanks(list) {
        var grid = document.getElementById("bank-grid");
        grid.innerHTML = "";
        list.forEach(function (sh, i) {
          var card = document.createElement("div");
          card.className = "gas-card-full"; card.style.animationDelay = (i*0.1)+"s";
          var svcsHtml = sh.servicesAr.map(function(s){return '<span class="grocery-item-tag">'+e(s)+'</span>';}).join("");
          var supplyHtml = sh.supplyAr.map(function(s){return '<span class="grocery-item-tag" style="opacity:.75">'+e(s)+'</span>';}).join("");
          card.innerHTML =
            '<div class="gas-full-image-wrap"><img src="'+ea(sh.image)+'" alt="'+ea(sh.nameAr)+'" loading="lazy" referrerpolicy="no-referrer" onerror="window.__afmodImageFallback(this)" /><div class="gas-full-image-overlay"></div><div class="gas-full-image-badge"><span class="grocery-main-badge">'+e(sh.badge)+'</span></div></div>'+
            '<div class="gas-full-body">'+
              '<div class="gas-full-header"><div><h3 class="gas-full-name">'+e(sh.nameAr)+'</h3><p class="gas-full-name-en">'+e(sh.nameEn)+'</p></div><div class="gas-full-price-badge" style="background:rgba(212,175,55,.15);color:#d4af37;border-color:rgba(212,175,55,.3)">'+e(fp(sh.price))+'</div></div>'+
              '<div class="gas-full-details">'+
                '<div class="gas-detail-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><div><strong>الموقع</strong><span>'+e(sh.locationAr)+'</span></div></div>'+
                '<div class="gas-detail-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><div><strong>ساعات العمل</strong><span>'+e(sh.hoursAr)+'</span></div></div>'+
                '<div class="gas-detail-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><div><strong>الدخل اليومي المتوقع</strong><span style="color:#d4af37;font-weight:700">'+e(sh.profitAr)+'</span></div></div>'+
              '</div>'+
              '<div class="grocery-items-section"><h4>الخدمات المصرفية</h4><div class="grocery-items-wrap">'+svcsHtml+'</div></div>'+
              '<div class="grocery-items-section" style="margin-top:.75rem"><h4>المخزون القابل للشراء</h4><div class="grocery-items-wrap">'+supplyHtml+'</div></div>'+
              '<p class="gas-card-notes" style="border-color:rgba(212,175,55,.3);color:rgba(212,175,55,.85)">'+e(sh.notesAr)+'</p>'+
              '<div class="gas-card-buy-row"><button class="btn-gas-grocery btn-buy-bank" type="button" style="background:linear-gradient(135deg,rgba(212,175,55,.2),rgba(212,175,55,.08));border-color:rgba(212,175,55,.4);color:#d4af37" data-id="'+ea(sh.id)+'" data-type="'+ea(sh.type)+'"><span class="btn-label">شراء بنك ريفر سيتي</span><span class="btn-gas-grocery-price" style="background:rgba(212,175,55,.15);color:#d4af37">'+e(fp(sh.price))+'</span></button></div>'+
            '</div>';
          card.querySelector(".btn-buy-bank").addEventListener("click", function(){
            var btn=this; btn.disabled=true; btn.querySelector(".btn-label").textContent="جاري الإرسال...";
            window.afApi.buyBusiness(sh.type, sh.id).then(function(){
              window.afToast("تم الشراء","تم تسجيل بنك ريفر سيتي باسمك بنجاح.","success");
            }).catch(function(err){
              var msg="تعذّر إتمام الشراء.";
              if(err&&err.status===402) msg="الرصيد غير كافٍ.";
              else if(err&&err.status===409) msg="البنك مملوك بالفعل.";
              else if(err&&err.status===503) msg="البوت غير متصل.";
              window.afToast("فشل الشراء",msg,"error");
            }).then(function(){btn.disabled=false;btn.querySelector(".btn-label").textContent="شراء بنك ريفر سيتي";});
          });
          grid.appendChild(card);
        });
      }

      window.afCheckAuth(function(user){
        document.getElementById("loading-screen").classList.add("hidden");
        document.getElementById("page").classList.remove("hidden");
        window.afRenderHeader(user,"bank");
        window.afRenderWatermark(user);
        renderBanks(BANKS);
      });
    })();
    </script>
  </body>
</html>
